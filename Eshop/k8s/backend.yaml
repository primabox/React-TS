apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eshop-backend
  template:
    metadata:
      labels:
        app: eshop-backend
    spec:
      containers:
      - name: backend
        image: eshop-backend:latest
        imagePullPolicy: Never
        env:
          - name: DB_HOST
            value: "postgres-service"
          - name: DB_NAME
            value: "eshop_db"
          - name: DB_USER
            value: "roman"
          - name: DB_PASS
            value: "heslo123"
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort
  selector:
    app: eshop-backend
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30001